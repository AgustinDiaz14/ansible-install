---
- name: Check if docker is installed
  ansible.builtin.command:
    cmd: docker --version
  register: docker_check
  failed_when: false
  changed_when: false

- name: Download Docker install script (non-Arch)
  ansible.builtin.get_url:
    url: "https://get.docker.com"
    dest: /tmp/docker-install.sh
    mode: '0755'
  when: docker_check.rc != 0 and ansible_os_family != "Archlinux"

- name: Install Docker via script (non-Arch)
  ansible.builtin.command:
    cmd: sh /tmp/docker-install.sh
  become: true
  when: docker_check.rc != 0 and ansible_os_family != "Archlinux"

- name: Install Docker via pacman (Arch)
  community.general.pacman:
    name:
      - docker
      - docker-compose
    state: present
  become: true
  when: docker_check.rc != 0 and ansible_os_family == "Archlinux"

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: docker
    append: true
  become: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

- name: Enable and start containerd service
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started
  become: true

- name: Configure Docker log rotation
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "local",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
    mode: '0644'
  become: true
  notify: Restart Docker

