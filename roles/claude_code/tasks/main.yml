---
- name: Check if claude is installed
  ansible.builtin.shell: |
    source "{{ nvm_dir }}/nvm.sh"
    command -v claude
  args:
    executable: /bin/bash
  register: claude_check
  failed_when: false
  changed_when: false

- name: Install Claude Code
  ansible.builtin.shell: |
    source "{{ nvm_dir }}/nvm.sh"
    npm install -g @anthropic-ai/claude-code
  args:
    executable: /bin/bash
  when: claude_check.rc != 0
